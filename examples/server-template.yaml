# dcm 서버 블루프린트 템플릿 예시 (YAML 또는 JSON 둘 다 가능).
#
# 사용법(운영진/서버 주인):
#   Discord에서  /setup-server  슬래시 커맨드 실행 → template 옵션에 이 파일 첨부
#   → 봇이 미리보기를 보여주고 '확인 실행' 버튼을 누르면 한 번에 셋업.
#   (같은 이름의 역할/카테고리/채널은 건너뛰므로 다시 실행해도 안전 = 멱등)
#
# 최상위 키: roles, categories (둘 중 하나 이상)

roles:
  - name: 운영진
    # 권한 이름(닫힌 집합). 가능: administrator, kick_members, ban_members,
    # manage_channels, manage_guild(=manage_server), manage_messages,
    # manage_nicknames, manage_roles, manage_webhooks, moderate_members(=timeout_members)
    permissions: [manage_channels, manage_roles, kick_members, ban_members, moderate_members]
  - name: 멤버
    permissions: []          # 권한 없음(기본 역할). permissions 생략해도 됨.

categories:
  - name: 2026-summer
    private: true            # true면 @everyone 열람 차단 → visible_to 역할만 보임(채널 상속)
    visible_to: [운영진, 멤버]
    channels:
      - name: 공지
        type: text           # type 생략 시 text
      - name: 일반
      - name: 회의
        type: voice

  - name: 잡담
    channels:
      - name: 수다
      - name: 음성-라운지
        type: voice
