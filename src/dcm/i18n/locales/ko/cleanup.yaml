  # 퍼지 미리보기 (purge_summary).
  purge_none: "아카이브가 비어 있고 삭제할 고아 역할/카테고리도 없어 ✅"
  purge_header: "🔥 영구 삭제 (되돌릴 수 없음):"
  purge_channels_section: "\n아카이브 채널 {count}개:"
  purge_roles_section: "\n고아 역할 {count}개:"
  purge_categories_section: "\n빈 카테고리 {count}개:"

  # 역할 삭제 사유 (RoleAction.reason).
  reason_dead_channel: "죽은 채널 전용·멤버 {mc}명"
  reason_no_members: "멤버 0명·미사용"
  reason_unused_member: "채널 미사용·멤버 {mc}명(비기수)"
