cleanup:
  # 채널 한 줄 표기.
  no_messages: "메시지 없음"
  days_ago: "{days:.0f}일 전"
  chan_line: "  • #{name} (마지막 활동 {age})"

  # 전체 정리 현황 리포트 (summary).
  report_header: "🧹 정리 현황 (비활성 기준 {days}일)"
  report_archive_section: "\n📦 아카이브로 옮길 비활성 채널: {count}개"
  report_purge_section: "\n🔥 이미 아카이브에 있어 퍼지(삭제)될 채널: {count}개"
  report_roles_section: "\n🗑️ 퍼지 때 삭제될 고아 역할: {count}개"
  report_categories_section: "\n🗂️ 퍼지 때 삭제될 빈 카테고리: {count}개"
  report_more: "  …외 {count}개"
  report_commands: "\n명령: /cleanup-archive (이동·되돌림 가능) → /cleanup-purge (영구 삭제)"

  # 목록 항목.
  chan_bullet: "  • #{name}"
  role_bullet: "  • @{name} ({reason})"
  cat_bullet: "  • {name}"

  # 아카이브 미리보기 (archive_summary).
  archive_none: "아카이브로 옮길 비활성 채널이 없어 ✅"
