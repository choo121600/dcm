router:
  # User-facing reply strings from the NL router (the privileged-dispatch chokepoint).
  guild_only: "⛔ 서버 안에서만 관리 명령을 쓸 수 있어."
  admin_only: "⛔ 이 명령은 관리자만 사용할 수 있어."
  destructive_blocked: "⚠️ '{verb}' 작업은 파괴적이라 NL 경로에서 직접 실행할 수 없어. 슬래시 커맨드로 확인 토큰을 발급받아 진행해줘."
  missing_params: "❓ '{verb}' 실행에 필요한 정보가 부족해: {missing}. 다시 알려줘."
  unknown_verb: "❓ 알 수 없는 작업: {verb}"
  dispatch_error: "⚠️ 명령 실행 중 오류가 발생했어."
  needs_confirmation: "⚠️ '{verb}' 작업은 확인이 필요해 (고위험). 슬래시 커맨드로 확인 토큰을 발급받아 진행해줘."
  ok: "✅ {detail}"
  fail: "❌ {detail}"
