template:
  # ServerTemplate.summary — preview text shown before applying.
  preview_title: "📋 Template preview"
  role_line: "• Roles: {roles}"
  category_line: "• 📁 {name}{lock}: {chs}"
  no_channels: "(no channels)"
  visible_suffix: "  (visible to: {names})"
  totals: "Totals: {roles} role(s) · {categories} category(ies) · {channels} channel(s)"
  truncated_suffix: "…(truncated)"

  # TemplateError messages (shown to the user verbatim).
  err_req_str: "{ctx}: must be a non-empty string."
  err_name_too_long: "{ctx}: name is too long (max {max} chars)."
  err_perms_list: "{ctx}.permissions: must be a list."
  err_perm_name_str: "{ctx}.permissions: permission names must be strings."
  err_unknown_perm: "{ctx}: unknown permission '{p}'. Allowed: {allowed}"
  err_empty_template: "Empty template. Please provide YAML or JSON content."
  err_yaml_parse: "YAML/JSON parse failed: {exc}"
  err_top_level_mapping: "The top level must be a mapping (object). e.g. roles:, categories:"
  err_roles_list: "roles must be a list."
  err_categories_list: "categories must be a list."
  err_need_one: "At least one of roles or categories is required."
  err_too_many_roles: "Too many roles (max {max})."
  err_too_many_categories: "Too many categories (max {max})."
  err_role_mapping: "roles[{i}]: must be a mapping."
  err_dup_role: "Duplicate role name: {name}"
  err_category_mapping: "categories[{i}]: must be a mapping."
  err_dup_category: "Duplicate category name: {name}"
  err_visible_to_list: "categories[{i}].visible_to: must be a list."
  err_channels_list: "categories[{i}].channels: must be a list."
  err_too_many_channels: "categories[{i}]: too many channels (max {max})."
  err_channel_mapping: "categories[{i}].channels[{j}]: must be a mapping."
  err_channel_type: "categories[{i}].channels[{j}].type: must be 'text' or 'voice' (got: {kind!r})."
